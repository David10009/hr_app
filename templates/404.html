<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страница не найдена - HR Система</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        
        .error-container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
        }
        
        .error-code {
            font-size: 120px;
            font-weight: bold;
            color: #667eea;
            text-shadow: 4px 4px 0 rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        
        .error-title {
            font-size: 28px;
            margin-bottom: 20px;
            color: #fff;
        }
        
        .error-message {
            font-size: 16px;
            color: #aaa;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .error-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: transparent;
            color: #667eea;
            border: 2px solid #667eea;
        }
        
        .btn-secondary:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }
        
        .search-form {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #333;
        }
        
        .search-input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #2a2a3e;
            color: white;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .search-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .search-btn {
            width: 100%;
            padding: 12px;
            background: #2a2a3e;
            color: #667eea;
            border: 1px solid #333;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .search-btn:hover {
            background: #33334e;
        }
        
        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #666;
        }
        
        .footer a {
            color: #667eea;
            text-decoration: none;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        
        .error-icon {
            font-size: 80px;
            animation: float 3s ease-in-out infinite;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">🔍</div>
        <div class="error-code">404</div>
        <div class="error-title">Страница не найдена</div>
        <div class="error-message">
            К сожалению, страница, которую вы ищете, не существует или была перемещена.<br>
            Проверьте правильность введённого адреса или вернитесь на главную.
        </div>
        
        <div class="error-actions">
            <a href="{{ url_for('index') }}" class="btn btn-primary">🏠 На главную</a>
            <a href="javascript:history.back()" class="btn btn-secondary">⬅️ Назад</a>
        </div>
        
        <div class="search-form">
            <form action="{{ url_for('employees') }}" method="GET">
                <input type="text" name="search" class="search-input" placeholder="Поиск сотрудников...">
                <button type="submit" class="search-btn">🔍 Поиск</button>
            </form>
        </div>
        
        <div class="footer">
            <p>HR Система управления персоналом © 2024 | <a href="{{ url_for('index') }}">Вернуться на главную</a></p>
        </div>
    </div>
</body>
</html>
